<h2>Today's Topics Card</h2>
<p class="subtitle">Same structure as Notes — IBM Plex Sans throughout</p>

<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  :root {
    --card-bg: rgba(255,255,255,0.72);
    --card-border: rgba(200,188,170,0.70);
    --accent: #F97316;
    --accent-dim: rgba(249,115,22,0.10);
    --accent-border: rgba(249,115,22,0.38);
    --fg: #1a0f05;
    --fg-sec: #5a3e28;
    --fg-dim: #9a8070;
    --muted-bg: rgba(237,232,223,0.60);
    --sans: 'IBM Plex Sans', system-ui, sans-serif;
    --mono: 'IBM Plex Mono', monospace;
    --radius: 14px;
  }

  .qcard {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: var(--radius);
    box-shadow: 0 1px 4px rgba(0,0,0,0.06), 0 4px 20px rgba(0,0,0,0.04);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    font-family: var(--sans);
    width: 100%;
    max-width: 340px;
  }
  .qcard-header {
    display: grid;
    grid-template-columns: 1fr auto;
    align-items: center;
    padding: 12px 16px 11px;
    border-bottom: 1px solid var(--card-border);
    background: var(--accent-dim);
  }
  .qcard-title {
    font-family: var(--sans);
    font-size: 14px;
    font-weight: 600;
    color: var(--fg);
    letter-spacing: -0.01em;
  }
  .live-badge {
    display: inline-flex; align-items: center; gap: 5px;
    font-family: var(--mono); font-size: 9px; font-weight: 600;
    letter-spacing: 0.08em; text-transform: uppercase;
    color: var(--accent);
  }
  .live-dot {
    width: 5px; height: 5px; border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes pulse {
    0%,100% { opacity:1; transform:scale(1); }
    50% { opacity:0.4; transform:scale(1.6); }
  }

  .qcard-content { padding: 4px 0; }
  .topic-row {
    display: flex; align-items: center; gap: 10px;
    padding: 8px 16px;
    border-bottom: 1px solid rgba(0,0,0,0.045);
    cursor: pointer;
    transition: background 0.12s;
  }
  .topic-row:last-child { border-bottom: none; }
  .topic-row:hover { background: rgba(249,115,22,0.04); }

  .topic-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }

  .topic-text {
    font-family: var(--sans);
    font-size: 13px;
    font-weight: 400;
    color: var(--fg);
    flex: 1; min-width: 0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .topic-badge {
    font-family: var(--mono); font-size: 8.5px; font-weight: 600;
    letter-spacing: 0.05em; text-transform: uppercase;
    padding: 2px 6px; border-radius: 4px;
    flex-shrink: 0;
  }

  .qcard-footer {
    padding: 10px 16px;
    border-top: 1px solid var(--card-border);
    background: var(--muted-bg);
    display: flex; align-items: center; justify-content: flex-end;
  }
  .link-btn {
    font-family: var(--sans); font-size: 11px; font-weight: 600;
    color: var(--accent); background: none; border: none; cursor: pointer; padding: 0;
  }
</style>

<div style="display:flex;justify-content:center;margin-top:24px;">
  <div class="qcard">
    <div class="qcard-header">
      <div class="qcard-title">Today's topics</div>
      <div class="live-badge">
        <span class="live-dot"></span>
        live
      </div>
    </div>

    <div class="qcard-content">
      <div class="topic-row">
        <span class="topic-dot" style="background:#e24b4a"></span>
        <span class="topic-text">Gaza ceasefire talks stall again</span>
        <span class="topic-badge" style="background:rgba(226,75,74,0.10);color:#e24b4a;border:1px solid rgba(226,75,74,0.22)">Conflict</span>
      </div>
      <div class="topic-row">
        <span class="topic-dot" style="background:#F97316"></span>
        <span class="topic-text">Ukraine front-line update</span>
        <span class="topic-badge" style="background:rgba(249,115,22,0.10);color:#F97316;border:1px solid rgba(249,115,22,0.28)">Developing</span>
      </div>
      <div class="topic-row">
        <span class="topic-dot" style="background:#7f77dd"></span>
        <span class="topic-text">Venezuela opposition crackdown</span>
        <span class="topic-badge" style="background:rgba(127,119,221,0.10);color:#7f77dd;border:1px solid rgba(127,119,221,0.25)">Politics</span>
      </div>
      <div class="topic-row">
        <span class="topic-dot" style="background:#facc15"></span>
        <span class="topic-text">Sahel drought escalation</span>
        <span class="topic-badge" style="background:rgba(250,204,21,0.12);color:#b45309;border:1px solid rgba(250,204,21,0.35)">Famine</span>
      </div>
      <div class="topic-row">
        <span class="topic-dot" style="background:#e24b4a"></span>
        <span class="topic-text">Myanmar junta airstrike</span>
        <span class="topic-badge" style="background:rgba(226,75,74,0.10);color:#e24b4a;border:1px solid rgba(226,75,74,0.22)">Conflict</span>
      </div>
    </div>

    <div class="qcard-footer">
      <button class="link-btn">Open digest →</button>
    </div>
  </div>
</div>
