<h2>Today's Topics — Clean Footer</h2>

<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  :root {
    --accent: #F97316;
    --fg: #F0E6D8;
    --fg-dim: rgba(240,230,216,0.42);
    --border: rgba(249,115,22,0.22);
    --shimmer: rgba(249,115,22,0.07);
    --bg: rgba(20,14,8,0.92);
    --row-border: rgba(255,255,255,0.04);
    --sans: 'IBM Plex Sans', system-ui, sans-serif;
    --mono: 'IBM Plex Mono', monospace;

    --red-subtle-bg:    oklch(25.93% 0.0834 19.02);
    --red-subtle-fg:    oklch(69.96% 0.2136 22.03);
    --amber-subtle-bg:  oklch(24.95% 0.0642 64.78);
    --amber-subtle-fg:  oklch(77.21% 0.1991 64.28);
    --purple-subtle-bg: oklch(25.91% 0.0921 314.41);
    --purple-subtle-fg: oklch(69.87% 0.2037 309.51);
    --blue-subtle-bg:   oklch(25.45% 0.0811 255.8);
    --blue-subtle-fg:   oklch(71.7% 0.1648 250.79);
  }

  .card-wrap {
    width: 300px;
    border-radius: 14px;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    background: var(--bg);
    backdrop-filter: blur(14px);
    border: 1px solid var(--border);
    box-shadow: 0 2px 8px rgba(0,0,0,0.30);
    font-family: var(--sans);
  }
  .card-header {
    padding: 10px 14px 9px;
    border-bottom: 1px solid var(--border);
    background: var(--shimmer);
  }
  .topic-body { flex: 1; overflow-y: auto; padding: 4px 0; }
  .topic-row {
    padding: 8px 14px;
    border-bottom: 1px solid var(--row-border);
    display: flex; align-items: center; gap: 10px;
  }
  .topic-row:last-child { border-bottom: none; }
  .topic-text {
    font-size: 0.76rem; font-weight: 400;
    color: var(--fg); line-height: 1.35; flex: 1;
  }
  .pill {
    display: inline-flex; align-items: center; justify-content: center;
    flex-shrink: 0; border-radius: 9999px;
    font-family: var(--sans); font-size: 11px; font-weight: 500;
    white-space: nowrap; height: 20px; padding: 0 7px; letter-spacing: 0.2px;
  }
  .pill-conflict  { background: var(--red-subtle-bg);    color: var(--red-subtle-fg); }
  .pill-politics  { background: var(--purple-subtle-bg); color: var(--purple-subtle-fg); }
  .pill-famine    { background: var(--amber-subtle-bg);  color: var(--amber-subtle-fg); }
  .pill-developing{ background: var(--blue-subtle-bg);   color: var(--blue-subtle-fg); }
  .card-footer {
    padding: 10px 14px;
    border-top: 1px solid var(--border);
    display: flex; align-items: center; justify-content: flex-end;
    background: var(--shimmer);
  }
</style>

<div style="display:flex;justify-content:center;margin-top:28px;">
  <div class="card-wrap">
    <div class="card-header">
      <div style="font-family:var(--sans);font-size:0.92rem;font-weight:600;color:var(--fg)">Today's topics</div>
    </div>
    <div class="topic-body">
      <div class="topic-row"><span class="topic-text">Gaza ceasefire talks stall again</span><span class="pill pill-conflict">Conflict</span></div>
      <div class="topic-row"><span class="topic-text">Ukraine front-line update</span><span class="pill pill-developing">Developing</span></div>
      <div class="topic-row"><span class="topic-text">Venezuela opposition crackdown</span><span class="pill pill-politics">Politics</span></div>
      <div class="topic-row"><span class="topic-text">Sahel drought escalation</span><span class="pill pill-famine">Famine</span></div>
      <div class="topic-row"><span class="topic-text">Myanmar junta airstrike</span><span class="pill pill-conflict">Conflict</span></div>
    </div>
    <div class="card-footer">
      <span style="font-family:var(--sans);font-size:0.72rem;font-weight:600;color:var(--accent)">Open full brief →</span>
    </div>
  </div>
</div>
