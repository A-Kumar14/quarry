<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Prompt Bar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #EDE8DF;
      font-family: 'IBM Plex Sans', system-ui, sans-serif;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 32px 24px; gap: 48px;
    }

    .section-label {
      font-family: 'IBM Plex Mono', monospace; font-size: 10px;
      letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.4;
      margin-bottom: 10px;
    }
    .section { width: 100%; max-width: 640px; }

    /* ── Prompt bar shell ── */
    .prompt-box {
      width: 100%;
      border-radius: 24px;
      border: 1px solid #444;
      background: #1F2023;
      padding: 8px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.24);
    }
    .prompt-box.focus-within {
      border-color: rgba(249,115,22,0.55);
    }

    /* Textarea */
    .prompt-textarea {
      width: 100%; border: none; background: transparent; outline: none; resize: none;
      font-family: 'IBM Plex Sans', system-ui, sans-serif;
      font-size: 0.95rem; color: rgba(240,230,216,0.90);
      padding: 4px 6px 8px; min-height: 44px; line-height: 1.5;
    }
    .prompt-textarea::placeholder { color: rgba(240,230,216,0.28); }

    /* Bottom bar */
    .prompt-actions {
      display: flex; align-items: center; justify-content: space-between;
      padding: 4px 2px 2px; gap: 8px;
    }
    .prompt-left { display: flex; align-items: center; gap: 4px; }

    /* Icon button base */
    .icon-btn {
      display: flex; align-items: center; justify-content: center;
      width: 32px; height: 32px; border-radius: 999px;
      border: none; background: transparent;
      color: rgba(240,230,216,0.38); cursor: pointer;
      transition: background 0.14s, color 0.14s;
    }
    .icon-btn:hover { background: rgba(255,255,255,0.07); color: rgba(240,230,216,0.80); }
    .icon-btn svg { width: 18px; height: 18px; }

    /* Toggle mode buttons */
    .mode-btn {
      display: flex; align-items: center; gap: 4px;
      height: 32px; padding: 0 8px; border-radius: 999px;
      border: 1px solid transparent; background: transparent;
      color: rgba(240,230,216,0.38); cursor: pointer; font-size: 0.72rem;
      font-family: 'IBM Plex Sans', sans-serif;
      transition: all 0.14s;
    }
    .mode-btn:hover { color: rgba(240,230,216,0.80); }
    .mode-btn.active {
      background: rgba(249,115,22,0.15);
      border-color: #F97316;
      color: #F97316;
    }
    .mode-btn svg { width: 16px; height: 16px; flex-shrink: 0; }

    /* Orange divider */
    .divider {
      width: 1.5px; height: 24px; margin: 0 2px;
      background: linear-gradient(to bottom, transparent, rgba(249,115,22,0.55), transparent);
      border-radius: 999px; flex-shrink: 0;
    }

    /* Send button */
    .send-btn {
      width: 32px; height: 32px; border-radius: 999px; border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0; transition: background 0.14s;
    }
    .send-btn.idle { background: transparent; color: rgba(240,230,216,0.38); }
    .send-btn.idle:hover { background: rgba(255,255,255,0.07); }
    .send-btn.has-content { background: #F97316; color: #fff; }
    .send-btn.has-content:hover { background: #ea6a0c; }
    .send-btn svg { width: 16px; height: 16px; }
  </style>
</head>
<body>

  <!-- Current / idle state -->
  <div class="section">
    <div class="section-label">Idle — no input</div>
    <div class="prompt-box">
      <textarea class="prompt-textarea" placeholder="Ask to drill into a signal or start a new investigation…" rows="1"></textarea>
      <div class="prompt-actions">
        <div class="prompt-left">
          <!-- Paperclip -->
          <button class="icon-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
            </svg>
          </button>
          <!-- Globe / Search -->
          <button class="mode-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/>
              <path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/>
            </svg>
          </button>
          <div class="divider"></div>
          <!-- Brain / Think -->
          <button class="mode-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9.5 2A2.5 2.5 0 0112 4.5v15a2.5 2.5 0 01-4.96-.46 2.5 2.5 0 01-2.96-3.08 3 3 0 01-.34-5.58 2.5 2.5 0 013.76-3.38z"/>
              <path d="M14.5 2A2.5 2.5 0 0112 4.5v15a2.5 2.5 0 004.96-.46 2.5 2.5 0 002.96-3.08 3 3 0 00.34-5.58 2.5 2.5 0 00-3.76-3.38z"/>
            </svg>
          </button>
          <div class="divider"></div>
          <!-- Canvas -->
          <button class="mode-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 7V5a2 2 0 012-2h2M17 3h2a2 2 0 012 2v2M21 17v2a2 2 0 01-2 2h-2M7 21H5a2 2 0 01-2-2v-2"/>
              <rect x="7" y="7" width="10" height="10" rx="1"/>
            </svg>
          </button>
        </div>
        <!-- Mic (idle) -->
        <button class="send-btn idle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2M12 19v4M8 23h8"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Active / has content state -->
  <div class="section">
    <div class="section-label">Has content — send button active</div>
    <div class="prompt-box">
      <textarea class="prompt-textarea" rows="1">What is happening in Gaza right now?</textarea>
      <div class="prompt-actions">
        <div class="prompt-left">
          <button class="icon-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
            </svg>
          </button>
          <button class="mode-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/>
              <path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/>
            </svg>
          </button>
          <div class="divider"></div>
          <button class="mode-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9.5 2A2.5 2.5 0 0112 4.5v15a2.5 2.5 0 01-4.96-.46 2.5 2.5 0 01-2.96-3.08 3 3 0 01-.34-5.58 2.5 2.5 0 013.76-3.38z"/>
              <path d="M14.5 2A2.5 2.5 0 0112 4.5v15a2.5 2.5 0 004.96-.46 2.5 2.5 0 002.96-3.08 3 3 0 00.34-5.58 2.5 2.5 0 00-3.76-3.38z"/>
            </svg>
          </button>
          <div class="divider"></div>
          <button class="mode-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 7V5a2 2 0 012-2h2M17 3h2a2 2 0 012 2v2M21 17v2a2 2 0 01-2 2h-2M7 21H5a2 2 0 01-2-2v-2"/>
              <rect x="7" y="7" width="10" height="10" rx="1"/>
            </svg>
          </button>
        </div>
        <!-- Arrow up (has content) -->
        <button class="send-btn has-content">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Mode active state -->
  <div class="section">
    <div class="section-label">Search mode active</div>
    <div class="prompt-box">
      <textarea class="prompt-textarea" placeholder="Search the web…" rows="1"></textarea>
      <div class="prompt-actions">
        <div class="prompt-left">
          <button class="icon-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/>
            </svg>
          </button>
          <button class="mode-btn active">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/>
              <path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/>
            </svg>
            Search
          </button>
          <div class="divider"></div>
          <button class="mode-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M9.5 2A2.5 2.5 0 0112 4.5v15a2.5 2.5 0 01-4.96-.46 2.5 2.5 0 01-2.96-3.08 3 3 0 01-.34-5.58 2.5 2.5 0 013.76-3.38z"/>
              <path d="M14.5 2A2.5 2.5 0 0112 4.5v15a2.5 2.5 0 004.96-.46 2.5 2.5 0 002.96-3.08 3 3 0 00.34-5.58 2.5 2.5 0 00-3.76-3.38z"/>
            </svg>
          </button>
          <div class="divider"></div>
          <button class="mode-btn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M3 7V5a2 2 0 012-2h2M17 3h2a2 2 0 012 2v2M21 17v2a2 2 0 01-2 2h-2M7 21H5a2 2 0 01-2-2v-2"/>
              <rect x="7" y="7" width="10" height="10" rx="1"/>
            </svg>
          </button>
        </div>
        <button class="send-btn idle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2M12 19v4M8 23h8"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

</body>
</html>
