<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Prompt Bar v3 — note token color</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #EDE8DF;
      font-family: 'IBM Plex Sans', system-ui, sans-serif;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      padding: 40px 24px; gap: 48px;
    }

    .section { width: 100%; max-width: 640px; }
    .section-label {
      font-family: 'IBM Plex Mono', monospace; font-size: 10px;
      letter-spacing: 0.08em; text-transform: uppercase; opacity: 0.4; margin-bottom: 10px;
    }

    .prompt-box {
      width: 100%; border-radius: 24px;
      border: 1px solid rgba(249,115,22,0.50);
      background: #1F2023; padding: 8px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.24);
    }

    /* contentEditable as textarea replacement */
    .prompt-input {
      width: 100%; outline: none; border: none; background: transparent;
      font-family: 'IBM Plex Sans', system-ui, sans-serif;
      font-size: 0.95rem; color: rgba(240,230,216,0.90);
      padding: 4px 6px 8px; min-height: 44px; line-height: 1.6;
      white-space: pre-wrap; word-break: break-word;
    }

    /* Option A — orange text, mono font */
    .token-a {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.88rem;
      color: #F97316;
    }

    /* Option B — orange pill/chip */
    .token-b {
      display: inline-flex; align-items: center; gap: 3px;
      background: rgba(249,115,22,0.15);
      border: 1px solid rgba(249,115,22,0.35);
      border-radius: 5px;
      padding: 0 6px; height: 22px;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 0.78rem; color: #F97316;
      vertical-align: middle;
      position: relative; top: -1px;
    }
    .token-b-slash { opacity: 0.55; }

    /* Option C — subtle underline only */
    .token-c {
      color: #F97316;
      border-bottom: 1px solid rgba(249,115,22,0.45);
    }

    .prompt-actions {
      display: flex; align-items: center; justify-content: space-between;
      padding: 4px 2px 2px; gap: 8px;
    }
    .prompt-left { display: flex; align-items: center; gap: 4px; }

    .icon-btn {
      display: flex; align-items: center; justify-content: center;
      width: 32px; height: 32px; border-radius: 999px; border: none;
      background: transparent; color: rgba(240,230,216,0.38); cursor: pointer;
    }
    .icon-btn svg { width: 18px; height: 18px; }

    .mode-btn {
      display: flex; align-items: center; gap: 5px;
      height: 32px; padding: 0 9px; border-radius: 999px;
      border: 1px solid transparent; background: transparent;
      color: rgba(240,230,216,0.38); cursor: pointer; font-size: 0.72rem;
    }
    .mode-btn svg { width: 15px; height: 15px; flex-shrink: 0; }

    .divider {
      width: 1.5px; height: 24px; margin: 0 2px;
      background: linear-gradient(to bottom, transparent, rgba(249,115,22,0.55), transparent);
      border-radius: 999px; flex-shrink: 0;
    }

    .send-btn {
      width: 32px; height: 32px; border-radius: 999px; border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; background: #F97316; color: #fff;
    }
    .send-btn svg { width: 16px; height: 16px; }

    .option-tag {
      display: inline-block;
      font-family: 'IBM Plex Mono', monospace; font-size: 9px;
      letter-spacing: 0.1em; text-transform: uppercase;
      background: rgba(249,115,22,0.12); color: #F97316;
      border: 1px solid rgba(249,115,22,0.25);
      border-radius: 4px; padding: 2px 6px; margin-bottom: 8px;
    }
  </style>
</head>
<body>

  <!-- Option A: orange mono text -->
  <div class="section">
    <div class="option-tag">A</div>
    <div class="section-label">Orange mono — lightweight</div>
    <div class="prompt-box">
      <div class="prompt-input" contenteditable="true" spellcheck="false"><span class="token-a">/Latest transfer market news</span>&nbsp;what's the latest on Dybala?</div>
      <div class="prompt-actions">
        <div class="prompt-left">
          <button class="icon-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg></button>
          <button class="mode-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 014 10 15.3 15.3 0 01-4 10 15.3 15.3 0 01-4-10 15.3 15.3 0 014-10z"/></svg>Search</button>
          <div class="divider"></div>
          <button class="mode-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9.5 2A2.5 2.5 0 0112 4.5v15a2.5 2.5 0 01-4.96-.46 2.5 2.5 0 01-2.96-3.08 3 3 0 01-.34-5.58 2.5 2.5 0 013.76-3.38z"/><path d="M14.5 2A2.5 2.5 0 0112 4.5v15a2.5 2.5 0 004.96-.46 2.5 2.5 0 002.96-3.08 3 3 0 00.34-5.58 2.5 2.5 0 00-3.76-3.38z"/></svg>Deep</button>
          <div class="divider"></div>
          <button class="mode-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>Notes</button>
        </div>
        <button class="send-btn"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg></button>
      </div>
    </div>
  </div>

</body>
</html>
